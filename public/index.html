<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Media Downloader</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <button id="themeToggle" class="theme-toggle" title="Basculer le thème">🌙</button>
        <main>
            <header class="app-header">
                <div class="header-content">
                    <h1>Media Downloader</h1>
                    <p class="header-subtitle">Téléchargez vos contenus préférés en un clin d'œil</p>
                </div>
            </header>

            <div class="container">
                <section class="card">
                    <h2 class="section-title">Ajouter des URLs</h2>
                    <form id="downloadForm">
                        <div class="textarea-wrapper">
                            <textarea
                                id="urlsInput"
                                placeholder="Collez vos URLs (une par ligne)&#10;Exemple:&#10;https://www.youtube.com/shorts/Ia4EHN0Ihfk&#10;https://www.youtube.com/shorts/4GyGdrvGilI"
                                rows="8"
                                required
                            ></textarea>
                            <button id="pasteBtn" type="button" class="paste-btn" title="Coller le contenu du presse-papiers">Coller</button>
                        </div>

                        <button id="downloadBtnAction" type="button" class="btn-primary">Télécharger tout</button>
                    </form>
                </section>

                <section class="card progress-card">
                    <h2 class="section-title">Progression</h2>
                    <div class="progress-container">
                        <div class="progress-info">
                            <span class="progress-label">Statut :</span>
                            <span id="step" class="progress-status">Inactif</span>
                        </div>
                        <div class="bar">
                            <div class="bar-inner" id="bar"></div>
                        </div>
                    </div>
                </section>

                <section id="videosListSection" style="display: none;" class="card">
                    <h2 class="section-title">Vidéos en cours</h2>
                    <div class="table-wrapper">
                        <table id="videosTable" class="videos-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>URL</th>
                                    <th>Statut</th>
                                    <th>Progression</th>
                                </tr>
                            </thead>
                            <tbody id="videosTableBody">
                            </tbody>
                        </table>
                    </div>
                </section>

                <section id="resultSection" style="display: none;" class="card">
                    <h2 class="section-title">Résultat</h2>
                    <pre id="result" class="result-output"></pre>
                </section>
            </div>
        </main>

        <script src="app.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Media Downloader</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <main>
            <h1>Media Downloader</h1>

            <form id="downloadForm">
                <input
                    id="url"
                    type="text"
                    placeholder="URL (YouTube, TikTok, Instagram, ...)"
                    required
                />

                <fieldset class="mode-group">
                    <legend>Format de sortie</legend>
                    <label>
                        <input type="radio" name="mode" value="video" checked />
                        Vidéo (mp4)
                    </label>
                    <label>
                        <input type="radio" name="mode" value="audio" />
                        Audio (mp3)
                    </label>
                </fieldset>

                <button id="downloadBtnAction" type="button">Télécharger</button>
            </form>

            <section class="progress-container">
                <h3>Étape : <span id="step">Inactif</span></h3>
                <div class="bar">
                    <div class="bar-inner" id="bar"></div>
                </div>
            </section>

            <pre id="result"></pre>

            <a id="downloadBtn" href="#" download>
                <button id="downloadLabel" type="button">
                    Télécharger le fichier
                </button>
            </a>
        </main>

        <script src="app.js"></script>
    </body>
</html>

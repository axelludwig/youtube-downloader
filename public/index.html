<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>YT Downloader</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .bar {
            width: 100%;
            height: 20px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 10px;
        }

        .bar-inner {
            height: 100%;
            width: 0%;
            background: #4caf50;
            border-radius: 5px;
            transition: width 0.2s;
        }
    </style>
</head>

<body>
    <h1>YouTube Downloader</h1>
    <input id="url" type="text" size="60" placeholder="URL YouTube" />
    <button id="downloadBtnAction">Télécharger</button>

    <h3>Étape : <span id="step">Inactif</span></h3>

    <div class="bar">
        <div class="bar-inner" id="bar"></div>
    </div>

    <pre id="result"></pre>
    <a id="downloadBtn" href="#" style="display:none;" download>
        <button>Télécharger la vidéo</button>
    </a>

    <script src="app.js"></script>
</body>

</html>
